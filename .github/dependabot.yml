# Dependabot config for Lusik-and-sons-
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
#
# Dependabot OPENS PRs for new versions + security patches but never merges them.
# The owner reviews + merges manually after the Netlify deploy preview is green.
#
# Weekly schedule keeps noise low. Security updates are grouped so a CVE wave lands as one PR.
#
# NOTE: next / react MAJOR bumps are ignored in the ROOT package (where they live), so a
# major upgrade is always a deliberate, tested change rather than an auto-PR that fails CI.
# The site builds with Next.js 15 (`next:build`); Vite has been fully removed, so there are
# no longer any vite ignores to carry. Security PATCHES and minor updates still flow through.

version: 2
updates:
  # Root app (Next.js build + React + Tailwind + Stripe SDK as a runtime dep)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    ignore:
      # Defer Next.js majors (16+) to a deliberate, tested upgrade.
      # Patch / minor security fixes on the current 15.x line still flow.
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      # React 19 deferred until the ecosystem + Next 15.x settle.
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]
    groups:
      security-patches:
        applies-to: security-updates
        patterns:
          - "*"
      patch-and-minor:
        applies-to: version-updates
        update-types:
          - "patch"
          - "minor"

  # Netlify Functions (server-side; Stripe SDK is here)
  - package-ecosystem: "npm"
    directory: "/netlify/functions"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "functions"
    ignore:
      # Major Stripe SDK upgrades often break; manual upgrade only after testing.
      - dependency-name: "stripe"
        update-types: ["version-update:semver-major"]
    groups:
      security-patches:
        applies-to: security-updates
        patterns:
          - "*"
      patch-and-minor:
        applies-to: version-updates
        update-types:
          - "patch"
          - "minor"

  # GitHub Actions workflow versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
