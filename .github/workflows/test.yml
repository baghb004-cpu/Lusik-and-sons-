# ============================================================
# Test suite — runs on every push + pull request
# ============================================================
# What this does:
#   1. Installs root dependencies (npm ci)
#   2. Runs the unit test suite (Node's built-in test runner;
#      no extra install needed)
#   3. Installs Playwright's Chromium binary (cached)
#   4. Runs the E2E smoke tests against a static-served index.html
#
# If either step fails the workflow fails, which blocks merging
# the PR (assuming branch protection is configured to require
# this check). Without that protection, the workflow is still
# useful — it surfaces a red X on the PR page so reviewers see
# something's wrong before approving.
# ============================================================

name: Tests

on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  e2e:
    name: E2E smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # Cache Playwright's browser binary so the workflow doesn't
      # download ~150MB on every run.
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

      # Surface the trace artifacts when a test fails so the PR
      # reviewer can see what the browser was doing at the moment
      # of failure.
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
