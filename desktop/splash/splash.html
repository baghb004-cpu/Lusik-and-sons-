<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Baghdo's Workshop</title>
<!-- ============================================================
  The splash mini-story v2 — BAGHDO & GOHAR (original stylized
  art from reference photos; no copyrighted styles). Entirely
  inline: zero network. The FALLBACK IS THE BASE LAYER: the final
  pose renders with every animation off.

  The cast:
    Baghdo — dark hair, the beard, white polo, khaki shorts.
    Gohar  — long dark curls, brown dress, gold cross necklace,
             and a cup of coffee she never, ever puts down.

  Timeline (~4.7s, then idle loop):
    scene 1  0.0–1.4s  couch life: Baghdo gaming hard, Gohar
                       sipping coffee, TV glowing
    scene 2  1.4–2.2s  the app launches "!" — Baghdo leaps,
                       controller goes flying. Gohar… sips.
    scene 3  2.2–3.4s  chore overdrive: Baghdo sweeps the floor
                       at impossible speed (dust clouds). Gohar
                       watches. Sips.
    scene 5  3.4–4.7s  both to camera — Baghdo thumbs-up, Gohar
                       waves (cup stays) — title card → idle bob
                       until the shell fades us out.

  Replacing the art: this file IS the art. The shell only needs
  #done and the app-ready/app-error listeners to keep working.
============================================================ -->
<style>
  :root {
    --ink: #1A1612; --cream: #F5EFE3; --gold: #B08842; --muted: #6B655D;
    --paper: #FFFFFF; --khaki: #C9B690; --dress: #7C4F35; --beard: #2E2620;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--cream);
    font-family: Georgia, "Times New Roman", serif;
    display: grid; place-items: center;
    border-radius: 14px;
    outline: 1px solid #1A161222; outline-offset: -1px;
    transition: opacity .5s ease;
    user-select: none; -webkit-user-select: none; cursor: default;
  }
  body.fade-out { opacity: 0; }
  .stage { position: relative; width: 440px; height: 290px; }
  .floor { position: absolute; left: 0; right: 0; bottom: 44px; height: 3px;
           background: #1A161226; border-radius: 2px; }

  /* ── set: TV + couch ── */
  .tv { position: absolute; left: 18px; bottom: 60px; width: 70px; height: 52px;
        background: var(--ink); border-radius: 8px; animation: tv-off 4.7s steps(1,end) forwards; }
  .tv::before { content: ""; position: absolute; inset: 6px; background: var(--gold);
        border-radius: 4px; opacity: .85; animation: tv-glow .35s ease-in-out infinite alternate; }
  .tv::after { content: ""; position: absolute; left: 27px; bottom: -10px; width: 16px; height: 12px; background: var(--ink); }
  .couch { position: absolute; left: 116px; bottom: 47px; width: 196px; height: 64px;
        background: var(--muted); border-radius: 14px 14px 6px 6px; }
  .couch::before { content: ""; position: absolute; left: -12px; top: -22px; width: 220px; height: 30px;
        background: var(--muted); border-radius: 12px; }
  .couch::after { content: ""; position: absolute; left: 8px; right: 8px; top: 6px; height: 10px;
        background: #1A161220; border-radius: 6px; }

  /* ── shared figure parts ── */
  .figure { position: absolute; width: 96px; height: 124px; }
  .head { position: absolute; left: 22px; top: 0; width: 52px; height: 50px;
        background: var(--ink); border-radius: 50% 50% 47% 47%; }
  .eye { position: absolute; top: 23px; width: 8px; height: 9px; background: var(--cream);
        border-radius: 50%; }
  .eye.l { left: 12px; } .eye.r { left: 31px; }
  .smile { position: absolute; left: 17px; top: 34px; width: 17px; height: 8px;
        border: 3px solid var(--cream); border-top: none; border-left: none; border-right: none;
        border-radius: 0 0 12px 12px; }
  .arm { position: absolute; top: 54px; width: 12px; height: 38px; border-radius: 7px;
        transform-origin: top center; }
  .leg { position: absolute; top: 96px; width: 14px; height: 26px; background: var(--ink);
        border-radius: 0 0 7px 7px; }

  /* ── BAGHDO: beard, white polo, khaki shorts ── */
  .baghdo { left: 140px; bottom: 56px; animation: b-pose 4.7s steps(1,end) forwards; }
  .baghdo .hair { position: absolute; left: 20px; top: -4px; width: 56px; height: 24px;
        background: var(--ink); border-radius: 50% 50% 20% 20%; }
  .baghdo .beard { position: absolute; left: 22px; top: 28px; width: 52px; height: 30px;
        background: var(--beard); border-radius: 30% 30% 50% 50%;
        clip-path: polygon(0 28%, 100% 28%, 100% 100%, 0 100%); }
  .baghdo .beard-smile { position: absolute; left: 17px; top: 6px; width: 17px; height: 8px;
        border: 3px solid var(--cream); border-top: none; border-left: none; border-right: none;
        border-radius: 0 0 12px 12px; }
  .baghdo .polo { position: absolute; left: 16px; top: 46px; width: 64px; height: 54px;
        background: var(--paper); border-radius: 40% 40% 30% 30%;
        border-bottom: 14px solid var(--khaki); }
  .baghdo .polo::before { content: ""; position: absolute; left: 26px; top: 0; width: 12px; height: 16px;
        background: var(--cream); border: 2px solid #1A161218; border-top: none; }
  .baghdo .arm { background: var(--paper); }
  .baghdo .arm.l { left: 8px;  animation: b-arm-l 4.7s ease forwards; }
  .baghdo .arm.r { left: 76px; animation: b-arm-r 4.7s ease forwards, b-idle 1.7s 5.4s ease-in-out infinite; }
  .baghdo .thumb { position: absolute; left: -3px; top: 30px; width: 16px; height: 16px;
        background: var(--paper); border-radius: 50% 50% 50% 12%; opacity: 0;
        animation: thumb-pop 4.7s steps(1,end) forwards; }
  .baghdo .eye, .baghdo .smile { animation: blink 4.7s steps(1,end) forwards, idle-blink 3.4s 5.4s steps(1,end) infinite; }
  .baghdo .smile { display: none; } /* the beard carries the smile */

  /* ── GOHAR: curls, brown dress, the eternal coffee ── */
  .gohar { left: 232px; bottom: 56px; animation: g-pose 4.7s steps(1,end) forwards; }
  .gohar .curls { position: absolute; left: 12px; top: -8px; width: 72px; height: 64px; z-index: -1; }
  .gohar .curls i { position: absolute; background: var(--ink); border-radius: 50%; }
  .gohar .curls i:nth-child(1) { left: 0;  top: 6px;  width: 26px; height: 30px; }
  .gohar .curls i:nth-child(2) { left: 46px; top: 6px; width: 26px; height: 30px; }
  .gohar .curls i:nth-child(3) { left: 8px;  top: 0;   width: 56px; height: 28px; border-radius: 50% 50% 30% 30%; }
  .gohar .curls i:nth-child(4) { left: -4px; top: 28px; width: 22px; height: 34px; }
  .gohar .curls i:nth-child(5) { left: 54px; top: 28px; width: 22px; height: 34px; }
  .gohar .dress { position: absolute; left: 12px; top: 46px; width: 72px; height: 56px;
        background: var(--dress); clip-path: polygon(22% 0, 78% 0, 100% 100%, 0 100%);
        border-radius: 6px; }
  .gohar .cross { position: absolute; left: 45px; top: 50px; width: 6px; height: 6px;
        background: var(--gold); clip-path: polygon(40% 0,60% 0,60% 40%,100% 40%,100% 60%,60% 60%,60% 100%,40% 100%,40% 60%,0 60%,0 40%,40% 40%); }
  .gohar .arm { background: var(--dress); }
  .gohar .arm.l { left: 6px;  animation: g-arm-wave 4.7s ease forwards, g-idle-wave 1.5s 5.4s ease-in-out infinite; }
  .gohar .arm.r { left: 78px; transform: rotate(-118deg); } /* the coffee arm. it does not move. */
  .gohar .cup { position: absolute; left: -7px; top: 30px; width: 16px; height: 13px;
        background: var(--paper); border-radius: 2px 2px 5px 5px; }
  .gohar .cup::after { content: ""; position: absolute; right: -5px; top: 2px; width: 7px; height: 7px;
        border: 2px solid var(--paper); border-radius: 50%; }
  .gohar .steam { position: absolute; left: -2px; top: 16px; width: 3px; height: 10px;
        border-radius: 2px; background: #6B655D66; animation: steam 1.4s ease-in-out infinite; }
  .gohar .eye, .gohar .smile { animation: blink 4.7s steps(1,end) forwards, idle-blink 2.9s 5.4s steps(1,end) infinite; }
  .gohar .head { animation: g-sip 4.7s ease forwards, g-idle-sip 3.4s 5.4s ease-in-out infinite; }

  /* ── props ── */
  .controller { position: absolute; left: 158px; bottom: 112px; width: 32px; height: 16px;
        background: var(--muted); border-radius: 9px; animation: controller-fly 4.7s ease forwards; }
  .controller::before, .controller::after { content: ""; position: absolute; top: -5px; width: 9px; height: 9px;
        background: var(--muted); border-radius: 50%; }
  .controller::before { left: 2px; } .controller::after { right: 2px; }
  .bang { position: absolute; left: 196px; bottom: 206px; font: bold 38px Georgia, serif; color: var(--gold);
        opacity: 0; transform: scale(.3) rotate(12deg); animation: bang-pop 4.7s ease forwards; }
  .broom { position: absolute; left: 96px; bottom: 52px; width: 9px; height: 64px;
        background: var(--gold); border-radius: 5px; transform-origin: bottom center; opacity: 0;
        animation: broom-sweep 4.7s ease forwards; }
  .broom::after { content: ""; position: absolute; left: -10px; bottom: -8px; width: 30px; height: 16px;
        background: var(--khaki); clip-path: polygon(15% 0, 85% 0, 100% 100%, 0 100%); }
  .dust { position: absolute; bottom: 50px; width: 12px; height: 9px; background: #6B655D44;
        border-radius: 50%; opacity: 0; }
  .dust.d1 { left: 84px;  animation: dust-puff 4.7s .1s ease forwards; }
  .dust.d2 { left: 110px; animation: dust-puff 4.7s .25s ease forwards; }
  .dust.d3 { left: 70px;  animation: dust-puff 4.7s .4s ease forwards; }

  /* ── title card (final state — the BASE LAYER) ── */
  #done { position: absolute; left: 0; right: 0; bottom: 2px; text-align: center; }
  #done .name { font-size: 24px; color: var(--ink); letter-spacing: .02em; }
  #done .name em { color: var(--gold); font-style: italic; }
  #done .sub { font-size: 11px; color: var(--muted); margin-top: 3px; letter-spacing: .14em;
        text-transform: uppercase; }
  .reveal { opacity: 0; animation: title-in 4.7s ease forwards; }

  /* ── the timeline ──  (scene %: s1 0–30, s2 30–46, s3 46–70, s5 72–100) */
  @keyframes tv-glow { from { opacity: .55; } to { opacity: .95; } }
  @keyframes tv-off { 0%, 29% { opacity: 1; } 36%, 100% { opacity: .18; } }
  @keyframes blink { 0%, 24% { height: 9px; } 25%, 28% { height: 2px; } 29%, 100% { height: 9px; } }
  @keyframes idle-blink { 0%, 91% { height: 9px; } 92%, 96% { height: 2px; } 97%, 100% { height: 9px; } }

  @keyframes b-pose {
    0%, 29%  { transform: translateY(16px); }                    /* couch slouch */
    30%, 45% { transform: translateY(-14px); }                   /* the leap */
    46%, 69% { transform: translate(-66px, 0); }                 /* at the broom */
    72%, 100%{ transform: translate(-12px, 0); }                 /* to camera */
  }
  @keyframes b-arm-l {
    0%, 29% { transform: rotate(62deg); }                        /* controller grip */
    30%, 45% { transform: rotate(155deg); }                      /* flail */
    46%, 69% { transform: rotate(40deg) translateY(-2px); }      /* broom hands */
    72%, 100%{ transform: rotate(10deg); }
  }
  @keyframes b-arm-r {
    0%, 29% { transform: rotate(-62deg); }
    30%, 45% { transform: rotate(-165deg); }                     /* flail */
    46%, 69% { transform: rotate(-30deg); }                      /* broom */
    72%, 100%{ transform: rotate(-198deg); }                     /* thumbs-up hold */
  }
  @keyframes b-idle { 0%, 100% { transform: rotate(-198deg); } 50% { transform: rotate(-190deg); } }
  @keyframes thumb-pop { 0%, 73% { opacity: 0; } 76%, 100% { opacity: 1; } }

  @keyframes g-pose {
    0%, 64% { transform: translateY(16px); }                     /* couch. comfortable. */
    66%, 100%{ transform: translateY(0) translateX(36px); }      /* strolls in for the finale */
  }
  @keyframes g-sip {
    0%, 8%   { transform: rotate(0); }
    10%, 16% { transform: rotate(-8deg); }                       /* sip */
    18%, 33% { transform: rotate(0); }
    34%, 38% { transform: rotate(4deg); }                        /* a glance at the chaos */
    40%, 56% { transform: rotate(-8deg); }                       /* longer sip. earned. */
    58%, 100%{ transform: rotate(0); }
  }
  @keyframes g-idle-sip { 0%, 70%, 100% { transform: rotate(0); } 80%, 90% { transform: rotate(-8deg); } }
  @keyframes g-arm-wave {
    0%, 69% { transform: rotate(14deg); }                        /* resting on the couch */
    74%, 100%{ transform: rotate(-205deg); }                     /* the wave */
  }
  @keyframes g-idle-wave { 0%, 100% { transform: rotate(-205deg); } 50% { transform: rotate(-188deg); } }
  @keyframes steam { 0%, 100% { transform: translateY(0); opacity: .5; } 50% { transform: translateY(-5px); opacity: .9; } }

  @keyframes controller-fly {
    0%, 29% { transform: translate(0,0) rotate(0); opacity: 1; }
    44%     { transform: translate(-70px, -84px) rotate(-220deg); }
    56%, 100% { transform: translate(-86px, 14px) rotate(-340deg); opacity: 1; }
  }
  @keyframes bang-pop {
    0%, 30% { opacity: 0; transform: scale(.3) rotate(12deg); }
    34%     { opacity: 1; transform: scale(1.25) rotate(-6deg); }
    42%     { opacity: 1; transform: scale(1); }
    50%, 100% { opacity: 0; transform: scale(.8); }
  }
  @keyframes broom-sweep {
    0%, 45% { opacity: 0; transform: rotate(0); }
    48%     { opacity: 1; transform: rotate(-16deg); }
    52%     { opacity: 1; transform: rotate(22deg); }
    56%     { opacity: 1; transform: rotate(-18deg); }
    60%     { opacity: 1; transform: rotate(24deg); }
    64%     { opacity: 1; transform: rotate(-16deg); }
    68%     { opacity: 1; transform: rotate(18deg); }
    71%, 100% { opacity: 0; }
  }
  @keyframes dust-puff {
    0%, 47% { opacity: 0; transform: translate(0,0) scale(.6); }
    52%     { opacity: .9; }
    62%     { opacity: .5; transform: translate(-12px, -16px) scale(1.3); }
    70%, 100% { opacity: 0; transform: translate(-20px, -26px) scale(1.6); }
  }
  @keyframes title-in { 0%, 75% { opacity: 0; transform: translateY(6px); } 87%, 100% { opacity: 1; transform: translateY(0); } }

  /* Reduced motion / no-animation fallback: the final pose. */
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; }
    .baghdo { transform: translate(-12px, 0); }
    .gohar { transform: translateX(36px); }
    .baghdo .arm.l { transform: rotate(10deg); } .baghdo .arm.r { transform: rotate(-198deg); }
    .gohar .arm.l { transform: rotate(-205deg); }
    .baghdo .thumb, #done .reveal { opacity: 1; }
    .tv::before { opacity: .3; }
    .controller, .broom, .dust, .bang { display: none; }
  }
</style>
</head>
<body>
  <div class="stage" aria-label="Baghdo's Workshop is starting">
    <div class="tv"></div>
    <div class="couch"></div>
    <div class="controller"></div>
    <div class="bang">!</div>
    <div class="broom"></div>
    <div class="dust d1"></div><div class="dust d2"></div><div class="dust d3"></div>

    <div class="figure baghdo">
      <div class="arm l"></div>
      <div class="arm r"><div class="thumb"></div></div>
      <div class="head">
        <div class="hair"></div>
        <div class="eye l"></div><div class="eye r"></div>
        <div class="beard"><div class="beard-smile"></div></div>
      </div>
      <div class="polo"></div>
      <div class="leg" style="left:26px"></div><div class="leg" style="left:58px"></div>
    </div>

    <div class="figure gohar">
      <div class="arm l"></div>
      <div class="arm r"><div class="cup"><div class="steam"></div></div></div>
      <div class="head">
        <div class="curls"><i></i><i></i><i></i><i></i><i></i></div>
        <div class="eye l"></div><div class="eye r"></div>
        <div class="smile"></div>
      </div>
      <div class="dress"><div class="cross"></div></div>
      <div class="leg" style="left:30px"></div><div class="leg" style="left:54px"></div>
    </div>

    <div class="floor"></div>
    <div id="done">
      <div class="name reveal">Baghdo’s <em>Workshop</em></div>
      <div class="sub reveal">warming up the workshop…</div>
    </div>
  </div>
  <script>
    // Skip: a click jumps straight to the final pose.
    addEventListener("click", () => {
      document.querySelectorAll("*").forEach((el) => {
        el.getAnimations?.().forEach((a) => { try { a.finish(); } catch {} });
      });
    });
    // The shell emits "app-ready" when the server is up → fade out.
    // "app-error" → show the message instead of hanging forever.
    if (window.__TAURI__?.event) {
      window.__TAURI__.event.listen("app-ready", () => {
        document.body.classList.add("fade-out");
      });
      window.__TAURI__.event.listen("app-error", (e) => {
        const sub = document.querySelector("#done .sub");
        if (sub) {
          sub.textContent = String(e.payload || "Something went wrong starting the workshop.");
          sub.style.cssText = "color:#9b2c2c;text-transform:none;letter-spacing:0;font-size:12px;opacity:1";
        }
        document.querySelector("#done .name")?.classList.remove("reveal");
      });
    }
  </script>
</body>
</html>
