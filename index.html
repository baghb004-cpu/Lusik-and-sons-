       3. WebSite        — minimal, just gives Google the canonical

     ============================================================ -->

     PWA — "Add to Home Screen" support
     ============================================================

     brand identity (name, theme colors, icons) so Android and
     desktop Chrome can install the site as an app. The Apple
     meta tags below handle iOS, which doesn't read the manifest
     and uses its own legacy attributes instead.

     Required icon files for the full experience (TODO_LUSIK —

       - /icon-192.png            192x192   Android home screen
       - /icon-512.png            512x512   Android splash + iOS
       - /icon-maskable-512.png   512x512   Android adaptive icon
                                            (with safe-zone padding)

     screenshot of the page as the icon.
     ============================================================ -->

<meta name="apple-mobile-web-app-capable" content="yes" />

<!-- Self-hosted fonts. The woff2 files live in /public/fonts/ and the
     @font-face declarations are in /public/fonts/fonts.css. See that
     file's header for the regeneration procedure.

     Why self-host: removes a CSP third-party origin (no fonts.googleapis
     .com or fonts.gstatic.com allowlisting), removes a privacy concern
     (Google can no longer fingerprint visitors via font CDN requests),
     and removes a runtime dependency (a Google Fonts outage would
     otherwise break our typography).

     The two preload hints below tell the browser to fetch the most-likely-
     needed font files (DM Sans regular for body copy, Fraunces upright
     latin for headings) BEFORE it has parsed fonts.css. Without these,
     fonts download serially: HTML → CSS → @font-face → woff2. With them,
     HTML → woff2 starts immediately in parallel with everything else.
     `crossorigin="anonymous"` is required for font preloads to actually
     be reused by the rendering engine. -->
<link rel="preload" href="/fonts/dmsans-rP2Yp2ywxg089UriI5-g4vlH9VoD8Cmcqbu0-K6z9mXg.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
<link rel="preload" href="/fonts/fraunces-6NU78FyLNQOQZAnv9bYEvDiIdE9Ea92uemAk_WBq8U_9v0c2Wa0KxC9TeP2Xz5c.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
<link rel="stylesheet" href="/fonts/fonts.css" />

<!-- ============================================================
     THEME — FOUC prevention
     ============================================================
     Runs synchronously before any paint. Reads the user's
     saved theme preference (localStorage key "ls_theme",
     value "light" | "dark" | "system"), defaults to "system"
     for new visitors, then resolves to a concrete light or
     dark and stamps it on the <html> element as
     data-theme="light|dark". The stylesheet's CSS variables
     swap on that attribute.

     `.no-transitions` is added on first paint and removed
     after one rAF so the initial render doesn't animate from
     light→dark when the system pref is dark — that flash is
     the whole point of the FOUC script.
     ============================================================ -->
<script>
(function() {
  try {
    var pref = localStorage.getItem("ls_theme") || "system";
    var systemDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
    var resolved = pref === "dark" ? "dark"
                 : pref === "light" ? "light"
                 : (systemDark ? "dark" : "light");
    document.documentElement.setAttribute("data-theme", resolved);
    document.documentElement.classList.add("no-transitions");
    // Drop the transition lock after the first frame so subsequent
    // theme toggles animate normally.
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        document.documentElement.classList.remove("no-transitions");
      });
    });
  } catch (_) {
    // localStorage blocked (Safari private mode, etc.) — just
    // fall back to light. No theme is set, CSS uses :root defaults.
  }
})();
</script>

<!-- ============================================================
     Netlify Forms — build-time detection target
     ============================================================
     Netlify Forms scans the deployed HTML for <form> tags with
     `data-netlify="true"` and registers them as form endpoints.
     React-controlled forms don't appear in the static HTML
     (Babel hasn't run yet at build time), so we put a hidden
     copy here that the build process can see. The live form
     in the footer POSTs to "/" with the same `form-name`
     attribute below and gets routed to this endpoint.

     Field list MUST match the dynamic form: form-name, bot-field
     (honeypot), and email. Adding a new field to one means
     adding it here too.

     The "bot-field" input is a standard Netlify honeypot — real
     users can't see it, so anything filled in is a bot.
     ============================================================ -->
<form name="newsletter" data-netlify="true" netlify-honeypot="bot-field" hidden>
  <input type="hidden" name="form-name" value="newsletter" />
  <input type="text"   name="bot-field" />
  <input type="email"  name="email" />
</form>
<div id="root"></div>
