# XcodeGen spec — run `xcodegen` in this directory to (re)generate
# LusikSons.xcodeproj. The generated project is gitignored; this file is the
# source of truth so diffs stay reviewable in short sessions.
name: LusikSons
options:
  bundleIdPrefix: com.lusikandsons
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
targets:
  LusikSons:
    type: application
    platform: iOS
    sources:
      - path: LusikSons
    info:
      path: LusikSons/Info.plist
      properties:
        CFBundleDisplayName: Lusik & Sons
        # Branded launch: the cream page color (dark-aware via the
        # LaunchBackground colorset) so launch blends into the app.
        UILaunchScreen:
          UIColorName: LaunchBackground
        # Landscape is on for the iPhone Fold's opened, 4:3 book posture
        # (and reads naturally on Max phones); layouts adapt via size
        # classes — see Theme/FoldLayout.swift.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lusikandsons.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UIUserInterfaceStyle: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
