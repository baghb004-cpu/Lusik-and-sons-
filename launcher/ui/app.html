<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Baghdo's Workshop</title>
<style>
  :root{
    --bg:#0c0b0a; --panel:#16140f; --panel2:#1f1c16; --border:#2c2820;
    --text:#ece6da; --muted:#8c8474; --accent:#c8a85a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
  button{font-family:inherit;cursor:pointer}

  /* ---------- black-box loading screen ---------- */
  #loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:18px;z-index:50;transition:opacity .5s ease}
  #loader.hidden{opacity:0;pointer-events:none}
  #loader .logo{width:54px;height:54px;border-radius:14px;background:linear-gradient(135deg,var(--accent),#7a6533);
    display:flex;align-items:center;justify-content:center;font-size:26px}
  #loader h1{margin:0;font-size:26px;font-weight:700;letter-spacing:.3px}
  #loader .status{color:var(--muted);font-size:14px;min-height:18px}
  #loader .bar{width:280px;height:6px;border-radius:6px;background:var(--panel2);overflow:hidden}
  #loader .fill{height:100%;width:0;background:var(--accent);transition:width .3s ease}

  /* ---------- app shell ---------- */
  #app{display:none;height:100%;flex-direction:column}
  #app.show{display:flex}
  .topbar{height:56px;flex:0 0 56px;display:flex;align-items:center;gap:12px;padding:0 16px;
    background:var(--panel);border-bottom:1px solid var(--border)}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700}
  .dot{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#7a6533)}
  .spacer{flex:1}
  .tbtn{background:var(--panel2);border:1px solid var(--border);color:var(--text);
    padding:8px 14px;border-radius:10px;font-size:13px}
  .tbtn:hover{background:#272219}
  .tbtn.primary{background:var(--accent);color:#1a160c;border-color:var(--accent);font-weight:600}

  .main{flex:1;display:grid;grid-template-columns:380px 1fr;min-height:0}
  .editor{overflow-y:auto;padding:20px;border-right:1px solid var(--border)}
  .editor h2{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:22px 0 8px}
  .editor h2:first-child{margin-top:0}
  .field{margin:10px 0}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
  .field input[type=text],.field textarea{width:100%;background:var(--panel2);border:1px solid var(--border);
    color:var(--text);border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
  .row{display:flex;gap:10px}
  .row .field{flex:1}
  .color-row{display:flex;align-items:center;gap:10px}
  .color-row input[type=color]{width:42px;height:34px;border:1px solid var(--border);border-radius:8px;background:none;padding:2px}
  .card-edit{background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:10px;margin:8px 0}
  .card-edit .x{float:right;color:#c97;background:none;border:none;font-size:14px}
  .addbtn{width:100%;background:none;border:1px dashed var(--border);color:var(--muted);
    padding:10px;border-radius:10px;font-size:13px;margin-top:6px}
  .addbtn:hover{color:var(--text);border-color:var(--accent)}

  /* ---------- live preview ---------- */
  .previewwrap{display:flex;align-items:center;justify-content:center;background:#080706;padding:24px;overflow:auto}
  .device{width:380px;max-width:100%;border-radius:28px;overflow:hidden;border:1px solid var(--border);
    box-shadow:0 30px 80px rgba(0,0,0,.6);background:#fff}
  .page{min-height:560px;display:flex;flex-direction:column}
  .hero{padding:40px 26px;color:#fff;background:#1a4d8f}
  .hero h1{margin:0 0 8px;font-size:30px;line-height:1.1}
  .hero p{margin:0 0 18px;font-size:15px;opacity:.92}
  .hero .cta{display:inline-block;padding:11px 20px;border-radius:999px;font-weight:600;font-size:14px;color:#1a160c}
  .cards{padding:18px 22px;display:flex;flex-direction:column;gap:12px;background:#fff;color:#1a1a1a;flex:1}
  .pcard{border:1px solid #eee;border-radius:14px;padding:14px 16px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
  .pcard h3{margin:0 0 4px;font-size:16px}
  .pcard p{margin:0;font-size:13px;color:#555}
  .previewlabel{position:absolute;top:14px;left:0;right:0;text-align:center;color:var(--muted);font-size:12px}

  #toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--accent);color:#1a160c;padding:10px 18px;border-radius:999px;font-size:13px;font-weight:600;
    opacity:0;transition:all .25s;z-index:60}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
  <div id="loader">
    <div class="logo">🛠️</div>
    <h1>Baghdo's Workshop</h1>
    <div class="status" id="lstatus">Starting…</div>
    <div class="bar"><div class="fill" id="lfill"></div></div>
  </div>

  <div id="app">
    <div class="topbar">
      <div class="brand"><div class="dot"></div> Baghdo's Workshop</div>
      <div class="spacer"></div>
      <button class="tbtn" onclick="openFolder()">📂 My files</button>
      <button class="tbtn" onclick="exportPage()">⬇ Export page</button>
      <button class="tbtn primary" onclick="save()">Save</button>
    </div>
    <div class="main">
      <div class="editor">
        <h2>Page</h2>
        <div class="field"><label>Title</label><input type="text" id="f_title" /></div>
        <div class="field"><label>Subtitle</label><input type="text" id="f_subtitle" /></div>
        <div class="field"><label>Button label</label><input type="text" id="f_button" /></div>
        <h2>Colors</h2>
        <div class="color-row">
          <div class="field" style="flex:1"><label>Background</label></div>
          <input type="color" id="f_bg" />
          <div class="field" style="flex:1"><label>Accent</label></div>
          <input type="color" id="f_accent" />
        </div>
        <h2>Cards</h2>
        <div id="cards"></div>
        <button class="addbtn" onclick="addCard()">+ Add card</button>
      </div>

      <div class="previewwrap" style="position:relative">
        <div class="previewlabel">Live preview — updates as you type</div>
        <div class="device">
          <div class="page">
            <div class="hero" id="p_hero">
              <h1 id="p_title"></h1>
              <p id="p_subtitle"></p>
              <span class="cta" id="p_cta"></span>
            </div>
            <div class="cards" id="p_cards"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast"></div>

<script>
"use strict";
// ---- state ----
var state = {
  title: "Mount Fuji",
  subtitle: "A featured landmark from the collection.",
  button: "Learn more",
  bg: "#1a4d8f",
  accent: "#c8a85a",
  cards: [
    { title: "Asia", text: "Mount Fuji, Wulingyuan" },
    { title: "Africa", text: "Sahara Desert" }
  ]
};

// ---- persistence via the host app (no browser, no server). Falls back to
// localStorage if opened outside the app, so it's still testable. ----
function hostSave(name, content){ try{ if(window.appSave) return window.appSave(name, content); localStorage.setItem("scm_"+name, content); }catch(e){} }
async function hostLoad(name){ try{ if(window.appLoad){ return await window.appLoad(name); } return localStorage.getItem("scm_"+name)||""; }catch(e){ return ""; } }
function hostLog(m){ try{ if(window.appLog) window.appLog(m); }catch(e){} }

// ---- live preview render (real time) ----
function render(){
  document.getElementById("p_title").textContent = state.title || "Your title";
  document.getElementById("p_subtitle").textContent = state.subtitle || "";
  var cta = document.getElementById("p_cta");
  cta.textContent = state.button || "";
  cta.style.display = state.button ? "inline-block" : "none";
  cta.style.background = state.accent;
  document.getElementById("p_hero").style.background = state.bg;
  var wrap = document.getElementById("p_cards");
  wrap.innerHTML = "";
  state.cards.forEach(function(c){
    var d = document.createElement("div"); d.className = "pcard";
    var h = document.createElement("h3"); h.textContent = c.title || "Card";
    var p = document.createElement("p"); p.textContent = c.text || "";
    d.appendChild(h); d.appendChild(p); wrap.appendChild(d);
  });
}

// ---- editor → state bindings ----
function bindInput(id, key){
  var el = document.getElementById(id);
  el.value = state[key];
  el.addEventListener("input", function(){ state[key] = el.value; render(); });
}
function renderCardsEditor(){
  var box = document.getElementById("cards"); box.innerHTML = "";
  state.cards.forEach(function(c, i){
    var d = document.createElement("div"); d.className = "card-edit";
    d.innerHTML = '<button class="x" title="remove">✕</button>'+
      '<div class="field"><label>Card title</label><input type="text" class="ct"/></div>'+
      '<div class="field"><label>Card text</label><input type="text" class="cx"/></div>';
    var t = d.querySelector(".ct"), x = d.querySelector(".cx");
    t.value = c.title; x.value = c.text;
    t.addEventListener("input", function(){ c.title = t.value; render(); });
    x.addEventListener("input", function(){ c.text = x.value; render(); });
    d.querySelector(".x").addEventListener("click", function(){ state.cards.splice(i,1); renderCardsEditor(); render(); });
    box.appendChild(d);
  });
}
function addCard(){ state.cards.push({title:"New card", text:""}); renderCardsEditor(); render(); }

// ---- toolbar actions ----
function toast(msg){ var t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(function(){t.classList.remove("show");},1600); }
function save(){ hostSave("project", JSON.stringify(state)); toast("Saved ✓"); hostLog("project saved"); }
function openFolder(){ try{ if(window.appOpenFolder) window.appOpenFolder(); }catch(e){} }
function buildStandaloneHtml(){
  var cards = state.cards.map(function(c){
    return '<div style="border:1px solid #eee;border-radius:14px;padding:14px 16px;margin:10px 0">'+
      '<h3 style="margin:0 0 4px">'+esc(c.title)+'</h3><p style="margin:0;color:#555">'+esc(c.text)+'</p></div>';
  }).join("");
  return '<!doctype html><meta charset=utf-8><title>'+esc(state.title)+'</title>'+
    '<body style="margin:0;font-family:system-ui,sans-serif">'+
    '<div style="padding:44px 26px;color:#fff;background:'+esc(state.bg)+'">'+
    '<h1 style="margin:0 0 8px;font-size:34px">'+esc(state.title)+'</h1>'+
    '<p style="margin:0 0 18px;opacity:.92">'+esc(state.subtitle)+'</p>'+
    (state.button?'<span style="display:inline-block;padding:11px 20px;border-radius:999px;font-weight:600;background:'+esc(state.accent)+';color:#1a160c">'+esc(state.button)+'</span>':'')+
    '</div><div style="padding:18px 22px;max-width:640px;margin:0 auto">'+cards+'</div>';
}
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function exportPage(){
  var html = buildStandaloneHtml();
  try{ if(window.appExport){ window.appExport("page.html", html); toast("Exported to My files ✓"); return; } }catch(e){}
  // fallback: download
  var a=document.createElement("a"); a.href="data:text/html;charset=utf-8,"+encodeURIComponent(html); a.download="page.html"; a.click();
  toast("Exported ✓");
}

// ---- startup: loading screen → load saved → app ----
var steps = ["Checking portable files…","Loading local tools…","Preparing your workspace…","Starting workspace…"];
async function boot(){
  var fill=document.getElementById("lfill"), status=document.getElementById("lstatus");
  for(var i=0;i<steps.length;i++){
    status.textContent = steps[i];
    fill.style.width = Math.round((i+1)/steps.length*100)+"%";
    await new Promise(function(r){ setTimeout(r, 320); });
  }
  // load saved project (if any)
  try{ var saved = await hostLoad("project"); if(saved){ var s=JSON.parse(saved); if(s&&s.title!=null) state=s; } }catch(e){}
  if(!state.cards) state.cards=[];
  // wire editor
  bindInput("f_title","title"); bindInput("f_subtitle","subtitle"); bindInput("f_button","button");
  var bg=document.getElementById("f_bg"), ac=document.getElementById("f_accent");
  bg.value=state.bg; ac.value=state.accent;
  bg.addEventListener("input",function(){state.bg=bg.value;render();});
  ac.addEventListener("input",function(){state.accent=ac.value;render();});
  renderCardsEditor(); render();
  // reveal
  document.getElementById("loader").classList.add("hidden");
  document.getElementById("app").classList.add("show");
  hostLog("workspace ready");
}
boot();
</script>
</body>
</html>
