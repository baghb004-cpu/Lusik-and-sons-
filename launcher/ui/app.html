<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Baghdo's Workshop</title>
<style>
  :root{--bg:#0c0b0a;--panel:#161410;--panel2:#1f1c16;--panel3:#272219;--border:#2c2820;
    --text:#ece6da;--muted:#8c8474;--accent:#c8a85a;--accent2:#4a90d9}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden;user-select:none}
  button{font-family:inherit;cursor:pointer;color:inherit}
  input,select,textarea{font-family:inherit}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#332e25;border-radius:5px}

  #loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:80;transition:opacity .5s}
  #loader.hidden{opacity:0;pointer-events:none}
  #loader .logo{width:58px;height:58px;border-radius:15px;background:linear-gradient(135deg,var(--accent),#7a6533);display:flex;align-items:center;justify-content:center;font-size:28px;animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
  #loader h1{margin:0;font-size:26px;font-weight:700}
  #loader .status{color:var(--muted);font-size:14px;min-height:18px}
  #loader .bar{width:300px;height:6px;border-radius:6px;background:var(--panel2);overflow:hidden}
  #loader .fill{height:100%;width:0;background:var(--accent);transition:width .3s}

  #app{display:none;height:100%;flex-direction:column}
  #app.show{display:flex}
  .topbar{height:54px;flex:0 0 54px;display:flex;align-items:center;gap:9px;padding:0 14px;background:var(--panel);border-bottom:1px solid var(--border)}
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px}
  .dot{width:24px;height:24px;border-radius:7px;background:linear-gradient(135deg,var(--accent),#7a6533)}
  .pname{color:var(--muted);font-size:13px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .spacer{flex:1}
  .tbtn{background:var(--panel2);border:1px solid var(--border);padding:8px 12px;border-radius:9px;font-size:13px}
  .tbtn:hover{background:var(--panel3)} .tbtn.primary{background:var(--accent);color:#1a160c;border-color:var(--accent);font-weight:600} .tbtn.on{background:var(--accent2);color:#fff;border-color:var(--accent2)}
  .chk{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
  .seg{display:flex;border:1px solid var(--border);border-radius:9px;overflow:hidden}
  .seg button{background:none;border:none;padding:7px 11px;font-size:12px;color:var(--muted)} .seg button.sel{background:var(--panel3);color:var(--text)}

  .main{flex:1;display:grid;grid-template-columns:216px 1fr 296px;min-height:0}
  .leftcol{display:flex;flex-direction:column;background:var(--panel);border-right:1px solid var(--border);min-height:0}
  .palette{flex:1;overflow-y:auto;padding:8px}
  .layers{height:170px;border-top:1px solid var(--border);overflow-y:auto;padding:6px 8px}
  .layers .lh{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:4px 4px 6px}
  .lrow{display:flex;align-items:center;gap:6px;padding:5px 7px;border-radius:7px;font-size:12px;cursor:pointer}
  .lrow:hover{background:var(--panel2)} .lrow.sel{background:var(--panel3)}
  .lrow .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lrow button{background:none;border:none;color:var(--muted);font-size:12px;padding:0 2px}
  .cat{margin-bottom:2px}
  .psearch{width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 10px;font-size:13px;margin:2px 0 8px}
  .psearch:focus{outline:none;border-color:var(--accent)}
  .cat .sech{padding:9px 8px;font-size:11px}
  .catname{padding:9px 8px 5px;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
  .items{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .item{background:var(--panel2);border:1px solid var(--border);border-radius:9px;padding:8px 4px;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:11px;cursor:grab;text-align:center}
  .item:hover{background:var(--panel3);border-color:var(--accent)} .item .ic{font-size:19px}

  .stage{background:#080706;display:flex;align-items:center;justify-content:center;overflow:auto;position:relative}
  .hint{position:absolute;top:12px;left:0;right:0;text-align:center;color:var(--muted);font-size:12px;pointer-events:none}
  .device{position:relative;background:#fff;border:1px solid var(--border);box-shadow:0 26px 70px rgba(0,0,0,.6);overflow:hidden}
  .device.phone{width:390px;height:760px;border-radius:30px} .device.desktop{width:900px;height:600px;border-radius:14px}
  .grid{position:absolute;inset:0;background-image:linear-gradient(#0001 1px,transparent 1px),linear-gradient(90deg,#0001 1px,transparent 1px);background-size:16px 16px;pointer-events:none}
  .obj{position:absolute;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .obj.sel{outline:2px solid var(--accent2);outline-offset:1px}
  .handle{position:absolute;width:14px;height:14px;right:-7px;bottom:-7px;background:var(--accent2);border:2px solid #fff;border-radius:4px;cursor:nwse-resize;z-index:9999}
  .ph{border:1.5px dashed #bbb;color:#777;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:12px;background:#fafafa;width:100%;height:100%}
  .ph .tag{font-size:10px;background:#eee;border-radius:6px;padding:1px 6px}
  .mapbox{background:repeating-linear-gradient(45deg,#e8eef0,#e8eef0 10px,#dde6ea 10px,#dde6ea 20px);color:#356;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:12px;width:100%;height:100%}
  @keyframes bounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-18px)}60%{transform:translateY(-6px)}}
  .bouncing{animation:bounce .6s}

  .inspector{background:var(--panel);border-left:1px solid var(--border);overflow-y:auto;padding:0 0 30px}
  .empty{color:var(--muted);font-size:13px;text-align:center;margin-top:50px;line-height:1.7;padding:0 24px}
  .sec{border-bottom:1px solid var(--border)}
  .sech{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--text);cursor:pointer;font-weight:600}
  .sech .ar{color:var(--muted);font-size:11px}
  .secb{padding:4px 14px 14px}
  .field{margin:8px 0} .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
  .field input,.field select,.field textarea{width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 10px;font-size:13px}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
  .two{display:flex;gap:8px}.two .field{flex:1} .three{display:flex;gap:6px}.three .field{flex:1}
  .chk2{display:flex;align-items:center;gap:7px;font-size:13px;margin:6px 0}
  .ibtns{display:flex;gap:8px;margin:12px 14px 0}
  .ibtns button{flex:1;background:var(--panel2);border:1px solid var(--border);padding:8px;border-radius:8px;font-size:12px} .ibtns button.danger{color:#e88}
  /* alignment grid */
  .aligng{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;width:108px;margin:4px 0}
  .aligng button{aspect-ratio:1;background:var(--panel2);border:1px solid var(--border);border-radius:6px;font-size:13px;color:var(--muted)}
  .aligng button:hover{border-color:var(--accent);color:var(--text)}
  /* box model */
  .bm{margin:6px 0}
  .bm .ring{border:1px dashed #4a443a;border-radius:8px;padding:16px 8px 8px;position:relative}
  .bm .ring>.nm{position:absolute;top:3px;left:8px;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .bm .col{display:flex;flex-direction:column;align-items:center;gap:5px}
  .bm .mid{display:flex;align-items:center;gap:8px;justify-content:center;width:100%}
  .bm input{width:40px;text-align:center;background:var(--panel3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:3px 2px;font-size:11px}
  .bm .content{min-width:54px;min-height:24px;border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:10px}

  .drawer{position:fixed;left:0;right:0;bottom:0;height:340px;background:var(--panel);border-top:1px solid var(--border);transform:translateY(100%);transition:transform .25s;z-index:40;display:flex;flex-direction:column}
  .drawer.open{transform:translateY(0)}
  .drawer .dh{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--border);font-size:13px}
  .dtabs{display:flex;gap:4px} .dtabs button{background:var(--panel2);border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:7px;font-size:12px} .dtabs button.sel{background:var(--panel3);color:var(--text)}
  .devview{flex:1;margin:0;overflow:auto;padding:12px 14px;font-family:Consolas,'Courier New',monospace;font-size:12px;color:#cfe;white-space:pre-wrap;line-height:1.5}
  #devconsole{display:flex;flex-direction:column;padding:0}
  #devout{flex:1;overflow:auto;padding:12px 14px;white-space:pre-wrap;color:#cfe}
  #devin{display:flex;gap:8px;border-top:1px solid var(--border);padding:8px 12px}
  #devin input{flex:1;background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:7px 10px;font-family:Consolas,monospace;font-size:12px}
  .modal{position:fixed;inset:0;background:#000a;display:none;align-items:center;justify-content:center;z-index:90} .modal.show{display:flex}
  .box{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px;width:380px;max-width:92vw}
  .box h3{margin:0 0 12px;font-size:16px} .plist{max-height:240px;overflow:auto;margin:6px 0}
  .prow{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;margin:4px 0;font-size:13px}
  .prow button{background:none;border:none}
  #toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#1a160c;padding:10px 18px;border-radius:999px;font-size:13px;font-weight:600;opacity:0;transition:all .25s;z-index:95} #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="loader"><div class="logo">🛠️</div><h1>Baghdo's Workshop</h1><div class="status" id="lstatus">Starting portable workspace…</div><div class="bar"><div class="fill" id="lfill"></div></div></div>

<div id="app">
  <div class="topbar">
    <div class="brand"><div class="dot"></div> Baghdo's Workshop</div>
    <span class="pname" id="pname">Untitled</span>
    <div class="spacer"></div>
    <label class="chk"><input type="checkbox" id="snap" checked/> Snap</label>
    <div class="seg"><button id="seg-phone" class="sel" onclick="setDevice('phone')">Phone</button><button id="seg-desktop" onclick="setDevice('desktop')">Desktop</button></div>
    <button class="tbtn" onclick="openProjects()">Projects</button>
    <button class="tbtn" id="previewBtn" onclick="togglePreview()">▶ Preview</button>
    <button class="tbtn" onclick="doExport()">⬇ Export</button>
    <button class="tbtn primary" onclick="saveProject()">Save</button>
    <button class="tbtn" id="advBtn" onclick="toggleDev()">⌘ Developer</button>
  </div>
  <div class="main">
    <div class="leftcol">
      <div class="palette" id="palette"></div>
      <div class="layers" id="layers"></div>
    </div>
    <div class="stage" id="stage">
      <div class="hint" id="hint">Drag a component in — or click it. Then click it on the canvas to edit.</div>
      <div class="device phone" id="device"><div class="grid" id="gridbg"></div></div>
    </div>
    <div class="inspector" id="inspector"></div>
  </div>
</div>

<div class="drawer" id="drawer">
  <div class="dh"><strong>⌘ Developer mode</strong>
    <div class="dtabs" id="dtabs"><button data-t="code" class="sel">Code</button><button data-t="data">Data</button><button data-t="console">Console</button></div>
    <div style="flex:1"></div>
    <button class="tbtn" id="devCopy">Copy code</button>
    <button class="tbtn" onclick="hOpenFolder()">Open files</button>
    <button class="tbtn" onclick="toggleDev()">Close</button>
  </div>
  <pre id="devcode" class="devview"></pre>
  <pre id="devdata" class="devview" style="display:none"></pre>
  <div id="devconsole" class="devview" style="display:none">
    <div id="devout"></div>
    <div id="devin"><span style="color:#7c8;align-self:center;font-family:Consolas,monospace">$</span><input id="devcmd" placeholder="type a command — e.g. help" autocomplete="off" spellcheck="false"/></div>
  </div>
</div>
<div class="modal" id="modal"><div class="box" id="modalbox"></div></div>
<div id="toast"></div>

<script>
"use strict";
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function el(t,p,k){var e=document.createElement(t);if(p)for(var n in p){if(n==='style')e.style.cssText=p[n];else if(n==='class')e.className=p[n];else if(n.slice(0,2)==='on')e[n]=p[n];else e.setAttribute(n,p[n]);}(k||[]).forEach(function(c){e.appendChild(typeof c==='string'?document.createTextNode(c):c);});return e;}
function $(id){return document.getElementById(id);}
function toast(m){var t=$("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},1700);}

function hSaveProject(n,c){try{if(window.appSaveProject)return window.appSaveProject(n,c);localStorage.setItem("proj_"+n,c);}catch(e){}}
async function hLoadProject(n){try{if(window.appLoadProject)return await window.appLoadProject(n);return localStorage.getItem("proj_"+n)||"";}catch(e){return"";}}
async function hListProjects(){try{if(window.appListProjects)return JSON.parse(await window.appListProjects());return Object.keys(localStorage).filter(function(k){return k.indexOf("proj_")===0;}).map(function(k){return k.slice(5);});}catch(e){return[];}}
function hDeleteProject(n){try{if(window.appDeleteProject)return window.appDeleteProject(n);localStorage.removeItem("proj_"+n);}catch(e){}}
function hSaveSettings(c){try{if(window.appSaveSettings)return window.appSaveSettings(c);localStorage.setItem("settings",c);}catch(e){}}
async function hLoadSettings(){try{if(window.appLoadSettings)return await window.appLoadSettings();return localStorage.getItem("settings")||"";}catch(e){return"";}}
function hExport(n,h){try{if(window.appExport){window.appExport(n,h);return true;}}catch(e){}var a=document.createElement("a");a.href="data:text/html;charset=utf-8,"+encodeURIComponent(h);a.download=n;a.click();return false;}
function hOpenFolder(){try{if(window.appOpenFolder)window.appOpenFolder();}catch(e){}}
function hLog(m){try{if(window.appLog)window.appLog(m);}catch(e){}}

   {type:"heading",dx:10,dy:14,w:100,h:26,p:{text:"Fast",fontSize:17,fill:"#1a1a1a",weight:700}},

 {id:"signup",label:"Signup form",ic:"✉️",objs:[

   {type:"heading",dx:24,dy:22,w:270,h:30,p:{text:"Join the list",fontSize:22,fill:"#1a1a1a",weight:700,align:"left"}},

  lg.push(el("label",{style:"font-size:12px;color:var(--accent);margin-top:6px;display:block"},["THEN (optional message)"]));lg.push(inp(o.action.thenMessage,function(v){o.action.thenMessage=v;}));
  box.appendChild(section("Action",lg));

  if(advanced){var ta=el("textarea",{rows:"4"});ta.value=o.custom||"";ta.addEventListener("input",function(){o.custom=ta.value;});box.appendChild(section("Custom code",[field("Runs on the action (advanced)",ta)]));}

  var b=el("div",{class:"ibtns"});b.appendChild(el("button",{onclick:function(){duplicateObj(o);}},["Duplicate"]));b.appendChild(el("button",{class:"danger",onclick:function(){deleteObj(o);}},["Delete"]));box.appendChild(b);
}
function duplicateObj(o){var n=JSON.parse(JSON.stringify(o));n.id=project.nextId++;n.name=o.name+" copy";n.x+=16;n.y+=16;n.z=project.objects.length+1;project.objects.push(n);selectedId=n.id;renderAll();autosave();}
function deleteObj(o){project.objects=project.objects.filter(function(x){return x.id!==o.id;});selectedId=null;renderAll();autosave();}
document.addEventListener("keydown",function(e){if(previewing)return;if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA")return;var o=getObj(selectedId);if(!o)return;if(e.key==="Delete")deleteObj(o);if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="d"){e.preventDefault();duplicateObj(o);}});

// ---- preview ----
function wirePreview(node,o){function run(){if(o.action.do==="bounce"){node.classList.remove("bouncing");void node.offsetWidth;node.classList.add("bouncing");}else if(o.action.do==="change color"){o.fill=o.action.color;styleNode(node,o);}else if(o.action.do==="make bigger"){o.w=Math.round(o.w*1.15);o.h=Math.round(o.h*1.15);styleNode(node,o);}else if(o.action.do==="hide object"){node.style.visibility="hidden";}else if(o.action.do==="show object"){node.style.visibility="visible";}else if(o.action.do==="move object"){o.x+=20;styleNode(node,o);}else if(o.action.do==="open another screen"){toast("Open screen: "+(o.action.target||"(none set)"));}else if(o.action.do==="play sound"){beep();}if(o.action.thenMessage)setTimeout(function(){toast(o.action.thenMessage);},150);if(o.custom&&advanced){try{(new Function("obj","node",o.custom))(o,node);}catch(err){toast("Custom code error");}}}
  if(o.action.when==="clicked")node.addEventListener("click",run);else if(o.action.when==="hovered")node.addEventListener("mouseenter",run);else if(o.action.when==="screen opens")setTimeout(run,300);else if(o.action.when==="timer finishes")setTimeout(run,2000);}
function beep(){try{var a=new (window.AudioContext||window.webkitAudioContext)();var o=a.createOscillator();o.connect(a.destination);o.frequency.value=660;o.start();setTimeout(function(){o.stop();a.close();},150);}catch(e){}}
function togglePreview(){previewing=!previewing;$("previewBtn").classList.toggle("on",previewing);$("previewBtn").textContent=previewing?"■ Stop preview":"▶ Preview";if(previewing)selectedId=null;$("hint").style.display="none";renderAll();}

function setDevice(d){project.device=d;$("seg-phone").classList.toggle("sel",d==="phone");$("seg-desktop").classList.toggle("sel",d==="desktop");renderCanvas();autosave();}

// ---- developer mode ----
var devTab="code";
function toggleDev(){advanced=!advanced;$("advBtn").classList.toggle("on",advanced);$("drawer").classList.toggle("open",advanced);if(advanced)renderDev();renderInspector();renderCanvas();}
function renderDev(){if(!advanced)return;$("devcode").textContent=generateHtml();$("devdata").textContent=JSON.stringify(project,null,2);}
function setDevTab(t){devTab=t;$("devcode").style.display=t==="code"?"block":"none";$("devdata").style.display=t==="data"?"block":"none";$("devconsole").style.display=t==="console"?"flex":"none";Array.prototype.forEach.call($("dtabs").children,function(b){b.classList.toggle("sel",b.getAttribute("data-t")===t);});if(t!=="console")renderDev();else $("devcmd").focus();}
function devEcho(s){var o=$("devout");o.appendChild(el("div",{},[s]));o.scrollTop=o.scrollHeight;}
function runDev(line){line=(line||"").trim();if(!line)return;devEcho("$ "+line);var pp=line.split(/\s+/),cmd=pp[0].toLowerCase(),arg=pp.slice(1).join(" ");
  if(cmd==="help")devEcho("Commands: help · list · count · add <type> · select <id> · delete <id|selected> · export · save · clear\nTypes: rect, circle, line, heading, paragraph, label, button, image, icon, input, map");
  else if(cmd==="list"){if(!project.objects.length)devEcho("(no items yet)");project.objects.forEach(function(o){devEcho("  #"+o.id+"  "+o.type+'  "'+o.name+'"');});}
  else if(cmd==="count")devEcho(project.objects.length+" item(s)");
  else if(cmd==="add"){var it=null;COMPONENTS.forEach(function(c){c.items.forEach(function(x){if(x.type===arg.toLowerCase()||x.label.toLowerCase()===arg.toLowerCase())it=it||x;});});if(it){addObject(it);renderDev();devEcho("added "+it.label+" (#"+selectedId+")");}else devEcho('unknown type "'+arg+'" — try: rect, circle, heading, button, icon, image, map');}
  else if(cmd==="select"){var o=getObj(parseInt(arg,10));if(o){selectedId=o.id;renderAll();devEcho("selected #"+o.id);}else devEcho("no item #"+arg);}
  else if(cmd==="delete"){var id=arg==="selected"?selectedId:parseInt(arg,10);var o2=getObj(id);if(o2){deleteObj(o2);renderDev();devEcho("deleted #"+id);}else devEcho("no item to delete");}
  else if(cmd==="export"){doExport();devEcho("exported to /exports.");}
  else if(cmd==="save"){saveProject();devEcho("saved.");}
  else if(cmd==="clear"){$("devout").innerHTML="";}
  else devEcho('unknown command "'+cmd+'". type "help"');
}

var saveTimer;function autosave(){clearTimeout(saveTimer);saveTimer=setTimeout(doSaveSilently,800);}
function doSaveSilently(){hSaveProject(project.name,JSON.stringify(project));hSaveSettings(JSON.stringify({last:project.name}));}
function saveProject(){if(project.name==="Untitled"){askName("Name your project","My Project",function(n){project.name=n;$("pname").textContent=n;doSaveSilently();toast("Saved ✓");});return;}doSaveSilently();toast("Saved ✓");hLog("saved "+project.name);}
function newProject(){askName("New project name","My Project",function(n){project={name:n,device:"phone",nextId:1,objects:[]};selectedId=null;$("pname").textContent=n;setDevice("phone");renderAll();$("hint").style.display="block";doSaveSilently();closeModal();toast("New project ✓");});}
async function openProjects(){var list=await hListProjects();var box=$("modalbox");box.innerHTML="";box.appendChild(el("h3",{},["Your projects"]));box.appendChild(el("div",{style:"color:var(--muted);font-size:12px;margin:-6px 0 8px"},["Saved on this drive · click one to open it."]));var pl=el("div",{class:"plist"});if(!list.length)pl.appendChild(el("div",{class:"empty",style:"margin:10px"},["No saved projects yet."]));list.forEach(function(n){var row=el("div",{class:"prow"});row.appendChild(el("button",{style:"font-size:13px",onclick:function(){loadProjectByName(n);}},["📄 "+n]));row.appendChild(el("button",{style:"color:#e88",onclick:function(){hDeleteProject(n);openProjects();}},["✕"]));pl.appendChild(row);});box.appendChild(pl);var b=el("div",{class:"ibtns"});b.appendChild(el("button",{onclick:newProject},["+ New"]));b.appendChild(el("button",{onclick:hOpenFolder},["Open files folder"]));b.appendChild(el("button",{onclick:closeModal},["Close"]));box.appendChild(b);$("modal").classList.add("show");}
async function loadProjectByName(n){var raw=await hLoadProject(n);if(!raw){toast("Could not open project");return;}try{var pr=JSON.parse(raw);project=pr;if(!project.objects)project.objects=[];project.objects.forEach(normalize);selectedId=null;$("pname").textContent=project.name;setDevice(project.device||"phone");renderAll();$("hint").style.display=project.objects.length?"none":"block";closeModal();}catch(e){toast("That project file looks damaged.");}}
function generateHtml(){var sz=deviceSize();var body=project.objects.slice().sort(function(a,b){return a.z-b.z;}).map(objToHtml).join("\n    ");return '<!doctype html>\n<html lang="en">\n<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>'+esc(project.name)+'</title></head>\n<body style="margin:0;background:#eee">\n  <div style="position:relative;width:'+sz.w+'px;height:'+sz.h+'px;margin:20px auto;background:#fff;box-shadow:0 10px 40px #0003;overflow:hidden">\n    '+body+'\n  </div>\n</body>\n</html>';}
function doExport(){hExport((project.name||"project")+".html",generateHtml());toast("Exported to /exports ✓");}
function objToHtml(o){var base='position:absolute;left:'+o.x+'px;top:'+o.y+'px;width:'+o.w+'px;height:'+o.h+'px;opacity:'+o.opacity+';transform:rotate('+o.rotate+'deg);box-shadow:'+(SHADOWS[o.shadow]||'none')+';border-radius:'+(o.type==="circle"?'50%':(o.radius||0)+'px')+';'+(o.borderW>0?'border:'+o.borderW+'px solid '+esc(o.borderColor)+';':'')+'padding:'+o.pad.t+'px '+o.pad.r+'px '+o.pad.b+'px '+o.pad.l+'px;';
  if(BOX.indexOf(o.type)>=0&&TEXTY.indexOf(o.type)<0)return '<div style="'+base+'background:'+esc(o.fill)+'"></div>';
  if(TEXTY.indexOf(o.type)>=0)return '<div style="'+base+(o.type==="button"?'background:'+esc(o.fill)+';':'')+'display:flex;align-items:center;justify-content:'+(o.align==="left"?"flex-start":o.align==="right"?"flex-end":"center")+'"><span style="color:'+(o.type==="button"?"#1a160c":esc(o.fill))+';font-size:'+o.fontSize+'px;font-weight:'+o.weight+';line-height:'+o.lineHeight+';letter-spacing:'+o.letterSpacing+'px;text-align:'+o.align+';font-family:'+(o.font==="system"?"system-ui,sans-serif":esc(o.font))+'">'+esc(o.text)+'</span></div>';
  if(o.type==="icon")return '<div style="'+base+'display:flex;align-items:center;justify-content:center;font-size:'+Math.min(o.w,o.h)*0.8+'px">'+esc(o.icon)+'</div>';
  return '<div style="'+base+'border:1px dashed #bbb;display:flex;align-items:center;justify-content:center;color:#777;font-size:12px">'+esc(o.label||o.type)+'</div>';}

function closeModal(){$("modal").classList.remove("show");}
function askName(title,def,cb){var box=$("modalbox");box.innerHTML="";box.appendChild(el("h3",{},[title]));var i=el("input",{type:"text",style:"width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 11px;font-size:14px"});i.value=def;box.appendChild(i);var b=el("div",{class:"ibtns"});b.appendChild(el("button",{style:"background:var(--accent);color:#1a160c;font-weight:600",onclick:function(){var v=i.value.trim();if(v)cb(v);}},["OK"]));b.appendChild(el("button",{onclick:closeModal},["Cancel"]));box.appendChild(b);$("modal").classList.add("show");setTimeout(function(){i.focus();i.select();},30);i.addEventListener("keydown",function(e){if(e.key==="Enter"){var v=i.value.trim();if(v)cb(v);}});}
$("modal").addEventListener("pointerdown",function(e){if(e.target.id==="modal")closeModal();});
// developer-mode wiring
$("dtabs").addEventListener("click",function(e){var t=e.target.getAttribute("data-t");if(t)setDevTab(t);});
$("devCopy").addEventListener("click",function(){var ta=document.createElement("textarea");ta.value=generateHtml();document.body.appendChild(ta);ta.select();try{document.execCommand("copy");toast("Code copied ✓");}catch(e){toast("Select + copy from the Code tab");}ta.remove();});
$("devcmd").addEventListener("keydown",function(e){if(e.key==="Enter"){runDev($("devcmd").value);$("devcmd").value="";}});

var steps=["Starting portable workspace…","Checking local files…","Loading visual builder…","Preparing canvas…","Opening your workspace…"];
async function boot(){var fill=$("lfill"),status=$("lstatus");for(var i=0;i<steps.length;i++){status.textContent=steps[i];fill.style.width=Math.round((i+1)/steps.length*100)+"%";await new Promise(function(r){setTimeout(r,300);});}
  renderPalette();
  try{var st=await hLoadSettings();if(st){var s=JSON.parse(st);if(s.last){var raw=await hLoadProject(s.last);if(raw){project=JSON.parse(raw);if(!project.objects)project.objects=[];project.objects.forEach(normalize);}}}}catch(e){hLog("recover failed");}
  $("pname").textContent=project.name;setDevice(project.device||"phone");renderAll();$("hint").style.display=project.objects.length?"none":"block";
  $("loader").classList.add("hidden");$("app").classList.add("show");hLog("workspace ready");}
boot();
</script>
