# ============================================================
# Lusik & Sons — Netlify project config (Next.js runtime)
# ============================================================

[build]
# Next build. prenext:build regenerates the journal data first (see
# package.json). publish points at Next's build output (.next); the
# @netlify/plugin-nextjs runtime transforms it into the served output +
# wires SSR/ISR + the image CDN. (Leaving publish unset made Netlify fall
# back to the repo root, which the Next plugin rejects as "same as base".)
publish = ".next"
command = "npm ci && npm run next:build"

[[plugins]]
package = "@netlify/plugin-nextjs"

[functions]
directory = "netlify/functions"
node_bundler = "esbuild"
external_node_modules = ["stripe"]

# ── KEEP: Stripe webhook pretty URL (framework-agnostic) ────
[[redirects]]
from = "/api/stripe-webhook"
to = "/.netlify/functions/stripe-webhook"
status = 200

# ── Legacy product shortcuts → canonical Next routes (301) ──
[[redirects]]
from = "/blanket"
to = "/shop/blankets/armenian-alphabet-blanket"
status = 301
[[redirects]]
from = "/bib"
to = "/shop/bibs/baby-bib"
status = 301

# ── Content Studio (Decap CMS) entry point ────────────────
# Serve the static CMS shell (public/studio/index.html) at /studio and /studio/
# so it's reachable regardless of CDN directory-index behavior. EXACT paths only
# (no /studio/* wildcard) so /studio/config.yml and Decap's assets still serve
# normally. Decap routes internally via hash (#/...), so only the shell needs a
# rule. /admin is intentionally NOT here — that's the Next order dashboard.
[[redirects]]
from = "/studio"
to = "/studio/index.html"
status = 200
[[redirects]]
from = "/studio/"
to = "/studio/index.html"
status = 200

# NOTE: every other redirect from the Vite config is intentionally REMOVED.
# Next's file-based routing now owns /, /shop/*, /journal/*, /story,
# /workshop, /faq, /contact, /shipping, /newsletter, /account, /admin, /gallery.

# ============================================================
# SECURITY HEADERS
# ============================================================
# NOTE: this block only applies to STATIC files served off the Netlify CDN
# (/_next/static, /img, /fonts, the public/ tree). Pages rendered through the
# Next.js runtime get their headers from next.config.mjs `headers()` instead —
# the two CSPs are kept identical on purpose (the /studio/* block below is the
# one intentional exception). If you change the policy here, change it there too.
# The ad-pixel hosts (connect.facebook.net, googletagmanager.com, …) are needed
# by the consent-gated Meta Pixel + Google Ads tags; api.anthropic.com was
# removed (the chat assistant calls our own /chat Function, not Anthropic).
[[headers]]
for = "/*"
[headers.values]
Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://identity.netlify.com https://cloud.umami.is https://connect.facebook.net https://www.googletagmanager.com https://www.googleadservices.com https://www.google.com; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https:; connect-src 'self' https://identity.netlify.com https://*.netlify.app https://cloud.umami.is https://*.sentry.io https://connect.facebook.net https://www.facebook.com https://www.googletagmanager.com https://www.google-analytics.com https://*.google.com https://googleads.g.doubleclick.net https://www.googleadservices.com; frame-src https://js.stripe.com https://hooks.stripe.com https://checkout.stripe.com https://*.doubleclick.net; child-src https://js.stripe.com https://hooks.stripe.com https://checkout.stripe.com https://*.doubleclick.net; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://checkout.stripe.com; object-src 'none'; upgrade-insecure-requests"
Strict-Transport-Security = "max-age=63072000; includeSubDomains"
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), interest-cohort=()"
Cross-Origin-Opener-Policy = "same-origin"

# Content Studio (Decap CMS) lives at /studio/* and needs a looser CSP than the
# rest of the site: Decap loads its bundle from unpkg, evaluates it (unsafe-eval),
# and commits via Git Gateway to api.github.com. Scoped to /studio/* ONLY — the
# public storefront and the /admin order dashboard keep the strict global CSP
# above. (Was "/admin/*" before the CMS moved off the order-dashboard path.)
[[headers]]
for = "/studio/*"
[headers.values]
Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://identity.netlify.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com; font-src 'self' data:; img-src 'self' data: blob: https:; connect-src 'self' https://identity.netlify.com https://*.netlify.app https://api.github.com https://unpkg.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests"
Strict-Transport-Security = "max-age=63072000; includeSubDomains"
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"

# ============================================================
# CACHE
# ============================================================
# Next's hashed static assets — safe to cache forever (immutable).
[[headers]]
for = "/_next/static/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# Self-hosted brand fonts. Filenames are content-hashed (a new file ships under
# a new name if a font ever changes), so they're safe to cache forever —
# repeat visits never re-download them.
[[headers]]
for = "/fonts/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# Product + editorial imagery (the bulk of page weight). Photos live at
# fixed /img/* paths and rarely change, so cache aggressively but keep
# stale-while-revalidate so a swapped photo still refreshes within a day
# instead of being frozen for a year. Big win for repeat-visit load time
# and bandwidth without sacrificing the ability to update a photo.
[[headers]]
for = "/img/*"
[headers.values]
Cache-Control = "public, max-age=86400, stale-while-revalidate=2592000"

# Hero brand photography (/img/hero/*) is fixed — the slideshow art set, not
# swappable product photos. Cache it long (30 days fresh + a year of
# stale-while-revalidate) so repeat visits never re-download it and PageSpeed's
# "efficient cache lifetimes" stops flagging the big hero JPEGs. This rule is
# more specific than /img/* above, so it wins for hero paths; product photos
# keep their shorter, refresh-friendly TTL.
[[headers]]
for = "/img/hero/*"
[headers.values]
Cache-Control = "public, max-age=2592000, stale-while-revalidate=31536000"

# ============================================================
# IMMERSIVE BUY SHEET — per-context feature flag
# ============================================================
# The mobile photo-immersive product sheet is gated on the build-time env
# var NEXT_PUBLIC_IMMERSIVE_SHEET, read in src/data/config.js as `=== "true"`.
# NEXT_PUBLIC_* vars are inlined PER BUILD, and Netlify builds each context
# with that context's environment — so the PRODUCTION deploy of main is
# compiled with "false" baked in and can NEVER inherit the preview value,
# even if this branch is merged. Turning it on live requires intentionally
# changing the production value below (visible in code review).
[context.production.environment]
  NEXT_PUBLIC_IMMERSIVE_SHEET = "false"

[context.deploy-preview.environment]
  NEXT_PUBLIC_IMMERSIVE_SHEET = "true"

[context.branch-deploy.environment]
  NEXT_PUBLIC_IMMERSIVE_SHEET = "false"
