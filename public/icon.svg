<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Lusik and Sons">
  <title>Lusik &amp; Sons</title>
  <!-- Cream square background, full bleed so it works as a maskable PWA icon. -->
  <rect width="512" height="512" fill="#f5efe3"/>
  <!-- L monogram, centered. Serif glyph picks up the brand typography from the site. -->
  <g font-family="Georgia, 'Playfair Display', 'Times New Roman', serif" text-anchor="middle">
    <text x="256" y="305" font-size="280" font-weight="500" fill="#1c2638">L</text>
    <text x="256" y="395" font-size="42" font-weight="400" fill="#b08842" letter-spacing="6">&amp; SONS</text>
  </g>
</svg>
