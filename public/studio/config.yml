# Netlify CMS (Decap) configuration — standard setup.
# The editor lives at /studio/ (/admin is the order dashboard).
# Saving publishes directly: the CMS commits to `main` and Netlify redeploys.

backend:
  name: git-gateway
  branch: main

media_folder: "public/journal-media"
public_folder: "/journal-media"

collections:
  - name: "journal"
    label: "Journal Posts"
    label_singular: "Post"
    folder: "src/data/journal-posts"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}} — {{publishedAt}}"
    fields:
      - { label: "Slug", name: "slug", widget: "string", hint: "URL path: /journal/<slug>. Never change on a published post." }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Published", name: "publishedAt", widget: "date", format: "YYYY-MM-DD" }
      - { label: "Read minutes", name: "readMinutes", widget: "number", default: 3, min: 1, max: 30, valueType: "int" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "categories"
    label: "Categories"
    label_singular: "Category"
    folder: "content/categories"
    create: true
    delete: false
    identifier_field: "label"
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    summary: "{{label}} ({{slug}})"
    fields:
      - { label: "Slug", name: "slug", widget: "string", hint: "URL: /shop/<slug>. Never change on a category with products." }
      - { label: "Label", name: "label", widget: "string" }
      - { label: "Label (Armenian)", name: "label_hy", widget: "string", required: false }
      - { label: "Eyebrow", name: "eyebrow", widget: "string", required: false }
      - { label: "Eyebrow (Armenian)", name: "eyebrow_hy", widget: "string", required: false }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Description (Armenian)", name: "description_hy", widget: "text", required: false }
      - { label: "Display order", name: "displayOrder", widget: "number", required: false, valueType: "int" }

  - name: "products"
    label: "Products"
    label_singular: "Product"
    folder: "content/products"
    create: true
    identifier_field: "name"
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    summary: "{{name}} ({{category}}) — {{status}}"
    fields:
      - { label: "Category", name: "category", widget: "select", options: ["blankets", "bibs", "towels", "baby"] }
      - { label: "Internal key", name: "key", widget: "string", hint: "Stable id. Never change on a live product." }
      - { label: "Slug", name: "slug", widget: "string", hint: "URL: /shop/<category>/<slug>. Never change once shared." }
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Name (Armenian)", name: "name_hy", widget: "string", required: false }
      - label: "Status"
        name: "status"
        widget: "select"
        default: "placeholder"
        options:
          - { label: "Draft (hidden from the site)", value: "draft" }
          - { label: "Coming soon (placeholder page)", value: "placeholder" }
          - { label: "Live (buyable)", value: "live" }
        hint: "Live requires a Trusted key whose server-side price matches Price from — the build refuses otherwise."
      - { label: "Trusted key", name: "trustedKey", widget: "string", required: false, hint: "Live products only: the server-side price entry that vouches for this product (ask a developer)." }
      - { label: "Price from ($)", name: "priceFrom", widget: "number", required: false, default: null, valueType: "int", min: 1, hint: "Display only — checkout prices live server-side. Blank = 'price coming soon'." }
      - { label: "Tagline", name: "tagline", widget: "string" }
      - { label: "Tagline (Armenian)", name: "tagline_hy", widget: "string", required: false }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Description (Armenian)", name: "description_hy", widget: "text", required: false }
      - { label: "Cover image", name: "coverImage", widget: "image", required: false }
      - { label: "Gallery", name: "images", widget: "list", required: false, field: { label: "Image", name: "image", widget: "image" } }
      - label: "Colorways"
        name: "colorways"
        widget: "list"
        required: false
        summary: "{{fields.label}}"
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "Photo indices", name: "indices", widget: "list", field: { label: "Index", name: "index", widget: "number", valueType: "int", min: 0 } }
          - label: "Swatch"
            name: "swatch"
            widget: "object"
            fields:
              - { label: "Solid color (hex)", name: "color", widget: "string", required: false }
              - { label: "Two-color split (2 hexes)", name: "dual", widget: "list", required: false, field: { label: "Hex", name: "hex", widget: "string" } }
              - { label: "Gradient (hex list)", name: "gradient", widget: "list", required: false, field: { label: "Hex", name: "hex", widget: "string" } }
      - label: "Details rows"
        name: "details"
        widget: "list"
        required: false
        summary: "{{fields.label}}"
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "Value", name: "value", widget: "text" }
      - { label: "Display order", name: "displayOrder", widget: "number", required: false, valueType: "int" }
      - { label: "Stripe Price ID (reserved)", name: "stripePriceId", widget: "string", required: false }

  - name: "site-content"
    label: "Site Content"
    files:
      - name: "announcement"
        label: "Announcement bar"
        file: "content/pages/announcement.json"
        fields:
          - { label: "Show the announcement", name: "enabled", widget: "boolean", default: false }
          - { label: "Message", name: "message", widget: "string", required: false }
          - { label: "Link", name: "link", widget: "string", required: false }
          - { label: "Link label", name: "linkLabel", widget: "string", required: false }
      - name: "home"
        label: "Home page"
        file: "content/pages/home.json"
        fields:
          - label: "Featured product"
            name: "featured"
            widget: "object"
            fields:
              - { label: "Category slug", name: "category", widget: "select", options: ["blankets", "bibs", "towels", "baby"] }
              - { label: "Product slug", name: "slug", widget: "string", hint: "Must be a live product's slug — the build checks." }
      - name: "story"
        label: "Our Story page"
        file: "content/pages/story.json"
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Heading", name: "heading", widget: "string" }
          - label: "Paragraphs"
            name: "paragraphs"
            widget: "list"
            field: { label: "Paragraph", name: "paragraph", widget: "text" }
          - { label: "Signature", name: "signature", widget: "string" }
          - { label: "Signature subline", name: "signatureSub", widget: "string" }
      - name: "testimonials"
        label: "Testimonials"
        file: "content/pages/testimonials.json"
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Title (before italics)", name: "titlePre", widget: "string" }
          - { label: "Title (italic part)", name: "titleEm", widget: "string" }
          - label: "Quotes"
            name: "quotes"
            widget: "list"
            summary: "{{fields.name}} — {{fields.quote}}"
            hint: "The site shows the first three — drag to reorder."
            fields:
              - { label: "Quote", name: "quote", widget: "text" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Place", name: "place", widget: "string", required: false }
      - name: "faq"
        label: "FAQ page"
        file: "content/pages/faq.json"
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Heading", name: "title", widget: "string" }
          - label: "Questions"
            name: "items"
            widget: "list"
            summary: "{{fields.q}}"
            fields:
              - { label: "Question", name: "q", widget: "string" }
              - { label: "Answer", name: "a", widget: "text" }
