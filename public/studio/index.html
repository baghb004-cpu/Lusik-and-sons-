<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Content Manager</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <!-- Pinned + SRI so a compromised CDN can't swap the editor's code.
         To upgrade: bump the version and recompute the hash:
         curl -sL https://unpkg.com/decap-cms@<V>/dist/decap-cms.js | openssl dgst -sha384 -binary | openssl base64 -A -->
    <script
      src="https://unpkg.com/decap-cms@3.8.4/dist/decap-cms.js"
      integrity="sha384-JNjmpWfdPuQ3I7ac38W0teoHcVxx7YdfDVpcgehfGqcu6ZBt26m/nmmBM2FzuO41"
      crossorigin="anonymous"
    ></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", (user) => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/studio/";
            });
          }
        });
      }
    </script>
  </body>
</html>
