<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#F5EFE3" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#15110E" media="(prefers-color-scheme: dark)" />
    <title>Lusik &amp; Sons</title>
    <meta
      name="description"
      content="Hand cross-stitched Armenian alphabet baby blankets, bibs, and heirloom gifts — made one at a time by Lusik in Southern California."
    />
    <!-- PWA / Add to Home Screen (Chunk 9) — same icon set + manifest
         values as lusikandsons.com, so the installed app and the site
         read as one brand on a home screen. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" href="/icon-192.png" type="image/png" sizes="192x192" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Lusik &amp; Sons" />
    <!-- OG/social card -->
    <meta property="og:title" content="Lusik &amp; Sons" />
    <meta
      property="og:description"
      content="Hand cross-stitched Armenian alphabet baby blankets, bibs, and heirloom gifts — made one at a time by Lusik in Southern California."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lusikandsons.com/og-image.jpg" />
    <!-- The brand faces — Fraunces (display) + DM Sans (body), same as the
         website and the planned iOS bundle. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300..700;1,300..700&family=DM+Sans:ital,wght@0,300..700;1,300..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
